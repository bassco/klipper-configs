[mcu]
serial: /dev/serial/by-id/usb-Klipper_lpc1768_0CF0FF0F48104AAF82AA675DC32000F5-if00

[printer]
#kinematics: limited_corexz
kinematics: corexz
#max_x_velocity: 400
#max_y_velocity: 300
max_velocity: 500 # hypotoneuse of the above two values
max_accel: 5000   # Y-limited (MZV@37.2); X allows 6680 (EI@60.0)
#max_x_accel: 8800 # from IS
#max_y_accel: 4700 # from IS
#scale_xy_accel: True # take lower of the axis accel
minimum_cruise_ratio: 0.5
max_z_velocity: 200 # arbitrary value
max_z_accel: 4400   # arbitrary value (must be less than max_accel)
square_corner_velocity: 8.0
# from vibration analysis
# speeds 2 <-> 80; 146 <-> 155; 196 <-> 205 mm/s

[include nozzle-adxl.cfg]

#####################################################################
# 	X/Y Stepper Settings
#####################################################################

[stepper_x]
enable_pin: !P2.1
step_pin: P2.2
dir_pin: P2.6
rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 200
# IGUS Chain hits belts when at 252 endstop length at 5mm; therefore reduce width for reliability
# set X max to 235 in the slicer
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_endstop: 0
position_min: -10
position_max: 252
homing_speed: 60
homing_positive_dir: false

[tmc2209 stepper_x]
diag_pin: ^P1.29
uart_pin: P1.17
interpolate: True
run_current: 0.9
home_current: 0.7
sense_resistor: 0.110
stealthchop_threshold: 0

[stepper_y]
enable_pin: !P2.8
step_pin: P0.19
dir_pin: !P0.20
rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 200  #set to 400 for 0.9 degree stepper
endstop_pin: tmc2209_stepper_y:virtual_endstop
position_endstop: 235
position_min: -10
position_max: 235        #  210 in the slicer
homing_speed: 50
homing_positive_dir: true

[tmc2209 stepper_y]
uart_pin: P1.15
interpolate: True
run_current: 0.9
home_current: 0.7
sense_resistor: 0.110
diag_pin: ^P1.27
#driver_SGTHRS: 130 ; overridden in autotune.cfg
stealthchop_threshold: 0

[stepper_z]
enable_pin: !P0.21
step_pin: P0.22
dir_pin: P2.11 # remove ! to change direction
rotation_distance: 40
microsteps: 32
endstop_pin: probe:z_virtual_endstop
position_max: 230
position_min: -20
homing_speed: 100
second_homing_speed: 10 # lower is more accurate and repeatable

[tmc2209 stepper_z]
uart_pin: P1.10
interpolate: True
run_current: 0.9
home_current: 0.7
sense_resistor: 0.110
stealthchop_threshold: 0

[screws_tilt_adjust]
# SW Nylock Mod: Screw 1 uses the 6mm metallic spacer so its
# height is considered the baseline. For tilt adjust using the
# command SCREWS_TILT_CALCULATE, this has to be your Screw 1:
#
#         ******************
#         * S7    S8    S9 *
#         *                *
#   Bed:  * S5    S1    S6 *
#         *                *
#         * S2    S3    S4 *
#         ******************
#
# one would determine the nozzle coordinates such that the Z probe is above the screws
screw1_name: center
screw1: 128,98
screw2_name: front_left
screw2: 20,-10
screw3_name: front_center
screw3: 133,-9
screw4_name: front_right
screw4: 238,-7
screw5_name: middle_left
screw5: 19,97
screw6_name: middle_right
screw6: 233,97
screw7_name: rear_left
screw7: 18,201
screw8_name: rear_center
screw8: 128,201.5
screw9_name: rear_right
screw9: 235,201
horizontal_move_z: 10.
speed: 150.
screw_thread: CCW-M3

#####################################################################
# 	Bed Heater
#####################################################################

[heater_bed]
heater_pin: P2.5
sensor_type: EPCOS 100K B57560G104F
sensor_pin: P0.23
#max_power: 1.0
min_temp: 0
max_temp: 120
control: pid
pid_kp: 129.90
pid_ki:   7.17
pid_kd: 345.00

[shaketune]
keep_raw_data: True

[input_shaper]
shaper_freq_x: 60.0
shaper_type_x: ei
damping_ratio_x: 0.088
shaper_freq_y: 37.2
shaper_type_y: mzv
# shaper_freq_y: 49.6
# shaper_type_y: ei
damping_ratio_y: 0.068

[include sensorless.cfg]
[include eddy.cfg]
[include sb2209.cfg]

[idle_timeout]
timeout: 1800

[gcode_arcs]
resolution: 0.1

[display_status]
[virtual_sdcard]
path: ~/gcode_files

[pause_resume]
recover_velocity: 50.

[include menus.cfg]
[include macros.cfg]
[include temp.cfg]
[include pa_calibration.cfg]
[include autotune.cfg]

