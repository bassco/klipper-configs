# BTT Eddy USB with eddy-ng
# See: https://github.com/vvuk/eddy-ng/wiki

[mcu eddy]
serial: /dev/serial/by-id/usb-Klipper_rp2040_50443403106DC01C-if00
restart_method: command

[probe_eddy_ng btt_eddy]
sensor_type: btt_eddy
i2c_mcu: eddy
i2c_bus: i2c0f
x_offset: 0
y_offset: 21.42

[temperature_sensor btt_eddy]
sensor_type: Generic 3950
sensor_pin: eddy:gpio26

[temperature_sensor btt_eddy_mcu]
sensor_type: temperature_mcu
sensor_mcu: eddy
min_temp: 10
max_temp: 100

[bed_mesh]
horizontal_move_z: 2
speed: 200
mesh_min: 20, 21
mesh_max: 235, 205
probe_count: 9, 9
algorithm: bicubic

[safe_z_home]
home_xy_position: 125, 117
z_hop: 20
z_hop_speed: 25
speed: 200
home_y_before_x: true

###############################
# Macros
###############################

# G28 override — coarse home then refine Z with eddy-ng probe static reading
[gcode_macro G28]
rename_existing: G28.1
gcode:
  STATUS_HOMING
  G28.1 {rawparams}
  {% if not rawparams or (rawparams and 'Z' in rawparams) %}
    G90
    G0 Z2 F6000
    G4 S1
    M400
    PROBE_EDDY_NG_PROBE_STATIC HOME_Z=1
    G0 Z5 F3000
  {% endif %}
  STATUS_READY

# Bed mesh wrapper for LED status
[gcode_macro BED_MESH_CALIBRATE]
rename_existing: BASE_BED_MESH_CALIBRATE
gcode:
  STATUS_MESHING
  BASE_BED_MESH_CALIBRATE {rawparams}
  G0 X125 Y117 Z20 F7200
  STATUS_READY
