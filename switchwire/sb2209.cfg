# Source: wget -O sb2209.cfg https://raw.githubusercontent.com/bigtreetech/EBB/refs/heads/master/EBB%20SB2240_2209%20CAN/sample-bigtreetech-ebb-sb-canbus-v1.0.cfg
# This file contains common pin mappings for the BIGTREETECH EBBCan
# Canbus board. To use this config, the firmware should be compiled for the
# STM32G0B1 with "8 MHz crystal" with "CAN bus (on PB0/PB1)".
# The "EBBCan" micro-controller will be used to control the components on the nozzle.

# See docs/Config_Reference.md for a description of parameters.

[mcu EBBCan]
canbus_uuid: d60074679658

[temperature_sensor EBB_NTC]
sensor_type: Generic 3950
sensor_pin: EBBCan: PA2

[adxl345 sb2209]
cs_pin: EBBCan: PB12
spi_software_sclk_pin: EBBCan: PB10
spi_software_mosi_pin: EBBCan: PB11
spi_software_miso_pin: EBBCan: PB2
axes_map: z,-y,x

#[resonance_tester]
#probe_points: 100, 100, 20
#accel_chip: adxl345

[extruder]
step_pin: EBBCan: PD0
dir_pin: EBBCan: PD1
enable_pin: !EBBCan: PD2
full_steps_per_rotation: 200
gear_ratio: 9:1
microsteps: 16
rotation_distance: 47.4162 # actual measured PolyAir at 210C
# rotation_distance: 47.088 #  - from Galileo2 github config
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: EBBCan: PB13
sensor_type: EPCOS 100K B57560G104F
sensor_pin: EBBCan: PA3
control: pid
pid_Kp: 21.527
pid_Ki: 1.063
pid_Kd: 108.982
min_temp: 0
max_temp: 280
max_extrude_only_distance: 200 # for 100mm calibration :wink:

# sensor_type:MAX31865
# sensor_pin: EBBCan: PA4
# spi_bus: spi1
# rtd_nominal_r: 100
# rtd_reference_r: 430
# rtd_num_of_wires: 2

[tmc2209 extruder]
uart_pin: EBBCan: PA15
run_current: 0.650
sense_resistor: 0.110
stealthchop_threshold: 999999

[fan]
##	Print Cooling Fan - XYE board, Fan Pin
pin: EBBCan: PA0 # careful! It was swamped dutring re-crimping - lol
kick_start_time: 0.5
##	Depending on your fan, you may need to increase this value
##	if your fan will not start. Can change cycle_time (increase)
##	if your fan is not able to slow down effectively
# off_below: 0.10
shutdown_speed: 1.0

[heater_fan hotend_fan]
pin: EBBCan: PA1 # careful! It was swamped dutring re-crimping - lol
heater: extruder
heater_temp: 50.0
tachometer_pin: EBBCan: PB15

[neopixel sb_leds]
pin: EBBCan:PD3
chain_count: 3
color_order: GRBW
initial_RED: 0.25
initial_GREEN: 1.0
initial_BLUE: 0.25
initial_WHITE: 0.0

[include sb_leds.cfg]

