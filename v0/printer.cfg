[include pa_cal.cfg]

# [save_variables]
# filename: ~/config/saved_variables.cfg

[include macros/marlin/*.cfg]
[include macros/print/*.cfg]
[include macros/test/*.cfg]

[include config/axis.cfg]
[include config/bed.cfg]
[include config/ebb-gen2.cfg]
[include config/pi.cfg]
[include config/shaketune.cfg]
[include mainsail.cfg]
[include config/autotune.cfg]
[include config/heating.cfg]
[include config/fans.cfg]
[include config/bed_led.cfg]
# [include helixscreen/helix_macros.cfg]

[mcu]
serial: /dev/serial/by-id/usb-Kalico17_stm32f103xe_30FFDA05344E393729680957-if00
restart_method: command

[pause_resume]

[display_status]

[respond]
default_type: echo

[virtual_sdcard]
path: ~/gcode_files

[idle_timeout]
timeout: 1800

[exclude_object]

[force_move]
enable_force_move: True

[printer]
kinematics: corexy
max_velocity: 600
max_accel: 25000
max_z_velocity: 100
max_z_accel: 2000
square_corner_velocity: 7.0

